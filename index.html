<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://*.peerjs.com wss://*.peerjs.com stun:* turn:*;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<script src="peerjs.min.js"></script>
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="no-referrer">
<title>لُغَتِي — Dilim</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
/* ── LIGHT MODE (default) ── */
:root{
  --gold:#D4880A;--gold-lt:#F5A623;--gold-bg:#FFF8EC;
  --bg-page:#F0F4F9;--bg-card:#FFFFFF;--bg-card2:#F7F9FC;
  --bg-header:#FFFFFF;
  --border:#D8E2EE;--border2:#C5D3E3;
  --text:#1E2A3A;--text2:#4A6080;--text3:#8FA0B4;
  --green:#16A34A;--green-bg:#F0FDF4;--green-lt:#86EFAC;
  --red:#DC2626;--red-bg:#FEF2F2;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --orange:#EA580C;--purple:#7C3AED;--purple-bg:#F5F3FF;
  --accent:#0EA5E9;--accent-bg:#F0F9FF;
  --radius:12px;
  --shadow:0 2px 12px rgba(30,42,58,.08);
  --shadow-md:0 4px 24px rgba(30,42,58,.12);
  /* legacy aliases */
  --darker:var(--bg-page);--dark:var(--bg-card);--card:var(--bg-card);--card2:var(--bg-card2);
}
/* ── DARK MODE ── */
[data-theme="dark"]{
  --gold:#F5A623;--gold-lt:#FBBF24;--gold-bg:#292000;
  --bg-page:#0D1117;--bg-card:#161B22;--bg-card2:#1C2333;
  --bg-header:#161B22;
  --border:#2D3748;--border2:#3D4F65;
  --text:#E6EDF3;--text2:#8B949E;--text3:#484F58;
  --green:#3FB950;--green-bg:#0D2A0F;--green-lt:#2EA043;
  --red:#F85149;--red-bg:#2D0A0A;
  --blue:#58A6FF;--blue-bg:#0D1F38;
  --orange:#FFA657;--purple:#C084FC;--purple-bg:#1E1030;
  --accent:#38BDF8;--accent-bg:#0C1F2E;
  --shadow:0 2px 12px rgba(0,0,0,.3);
  --shadow-md:0 4px 24px rgba(0,0,0,.5);
  --darker:var(--bg-page);--dark:var(--bg-card);--card:var(--bg-card);--card2:var(--bg-card2);
}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg-page);color:var(--text);direction:rtl;min-height:100vh;transition:background .25s,color .25s}
#app{max-width:520px;margin:0 auto;background:var(--bg-page);min-height:100vh;position:relative}
.tr{font-size:10px;color:var(--text3);font-style:italic;direction:ltr;text-align:right;margin-top:2px}
.bg{background:var(--bg-card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.bgold{background:linear-gradient(135deg,var(--gold-lt),var(--gold));color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;box-shadow:0 3px 12px rgba(212,136,10,.3);transition:.15s}
.bgold:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(212,136,10,.4)}
.bgold:active{opacity:.9;transform:translateY(0)}
.bdark{background:var(--bg-card);color:var(--text);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px;font-size:14px;cursor:pointer;width:100%;font-family:inherit;transition:.15s}
.bdark:hover{border-color:var(--border2);background:var(--bg-card2)}
.bgreen{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;border:none;border-radius:var(--radius);padding:11px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;box-shadow:0 3px 10px rgba(22,163,74,.25)}
.bred{background:var(--red-bg);color:var(--red);border:1.5px solid #FECACA;border-radius:var(--radius);padding:11px;font-size:14px;cursor:pointer;width:100%;font-family:inherit}
input,select,textarea{background:var(--bg-card2);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-size:14px;font-family:inherit;direction:rtl;outline:none;width:100%;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold-lt);background:var(--bg-card);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
select option{background:var(--card)}
textarea{resize:vertical;min-height:80px;line-height:1.7}
.opt{background:var(--bg-card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);cursor:pointer;text-align:right;font-family:inherit;width:100%;display:block;margin-bottom:8px;transition:.15s;box-shadow:var(--shadow)}
.opt:hover,.opt:active{border-color:var(--gold-lt);background:var(--gold-bg)}
.cat-chip{border-radius:10px;padding:10px 7px;cursor:pointer;text-align:center;border:1.5px solid var(--border);background:var(--bg-card);user-select:none;transition:.15s;box-shadow:var(--shadow)}
.cat-chip:hover{border-color:var(--gold-lt);transform:translateY(-2px)}
.cat-chip.sel{border-color:var(--gold);background:var(--gold-bg);box-shadow:0 0 0 2px rgba(212,136,10,.2)}
.code-box{background:var(--gold-bg);color:var(--gold);border:2px solid var(--gold);border-radius:var(--radius);padding:16px;text-align:center;letter-spacing:8px;font-size:34px;font-weight:700;color:var(--gold);font-family:'Courier New',monospace}
.modal-bg{position:fixed;inset:0;background:rgba(30,42,58,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg-card);border-radius:16px;padding:20px;width:100%;max-width:420px;border:1px solid var(--border);max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-md)}
/* Answer buttons - Kahoot style */
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.ans-btn{border:none;border-radius:14px;padding:20px 10px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:.1s;-webkit-tap-highlight-color:transparent}
.ans-btn:active{transform:scale(.96)}
.ans-btn .sym{font-size:24px}
.ans-btn.A{background:#EF4444}
.ans-btn.B{background:#3B82F6}
.ans-btn.C{background:#22C55E}
.ans-btn.D{background:#F59E0B}
.ans-btn.dim{opacity:.35;transform:scale(.97)}
.ans-btn.correct{box-shadow:0 0 0 4px #fff,0 0 0 7px var(--green);background:#1E8A4A}
.ans-btn.wrong{box-shadow:0 0 0 4px #fff,0 0 0 7px var(--red);background:#8A1E1E}
/* Timer bar */
.timer-bar{height:7px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:14px}
.timer-fill{height:100%;border-radius:100px;transition:width 1s linear,background .5s}
/* Podium */
.pod{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:14px 0}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.pod-box{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
/* Score ring */
.score-ring{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;border:3px solid}
/* Animations */
@keyframes SR{to{transform:rotate(360deg)}}
#sp{animation:SR 1.2s linear infinite;display:inline-block}
@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .22s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.su{animation:slideUp .3s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.pulse{animation:pulse .6s ease infinite}
@keyframes bounceIn{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.bi{animation:bounceIn .5s ease}
/* Host big screen */
.host-q{font-size:22px;font-weight:700;line-height:1.7;text-align:center;padding:20px;background:var(--bg-card2);border:1px solid var(--border);border-radius:14px;margin-bottom:14px}
.host-ans{padding:14px 16px;border-radius:10px;font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:12px}
/* Player answered pod */
.plr-pod{display:flex;align-items:center;gap:8px;background:var(--bg-card);border-radius:9px;padding:9px 12px;margin-bottom:6px}
/* Live badge */
.live-badge{background:#EF4444;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:.5px;animation:pulse .8s ease infinite}

/* ── PIN LOCK ── */
#pin-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#0D1117 0%,#1a2744 50%,#0D1117 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;direction:rtl}
#pin-overlay.hide{animation:pinFadeOut .4s ease forwards}
@keyframes pinFadeOut{to{opacity:0;transform:scale(1.04);pointer-events:none}}
.pin-logo{font-size:64px;font-weight:800;background:linear-gradient(135deg,#F5A623,#D4880A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;line-height:1}
.pin-title{font-size:20px;font-weight:700;color:#E6EDF3;margin-bottom:4px}
.pin-sub{font-size:13px;color:#8B949E;margin-bottom:32px}
.pin-dots{display:flex;gap:14px;margin-bottom:28px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #3D4F65;background:transparent;transition:.2s}
.pin-dot.filled{background:#F5A623;border-color:#F5A623;transform:scale(1.1)}
.pin-dot.error{background:#F85149;border-color:#F85149;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px;margin-bottom:16px}
.pin-key{height:68px;border-radius:14px;background:#161B22;border:1.5px solid #2D3748;color:#E6EDF3;font-size:22px;font-weight:700;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;-webkit-tap-highlight-color:transparent;user-select:none}
.pin-key:active{background:#1C2333;transform:scale(.94);border-color:#F5A623}
.pin-key .sub{font-size:9px;color:#484F58;letter-spacing:1.5px}
.pin-key.del{background:transparent;border-color:transparent;font-size:18px}
.pin-key.del:active{background:#1C2333}
.pin-err{font-size:13px;color:#F85149;font-weight:600;min-height:20px;margin-top:4px;transition:.2s}
.pin-hint{font-size:11px;color:#484F58;margin-top:12px;text-align:center;line-height:1.8}

</style>
</head>
<body>

<div id="pin-overlay">
  <div class="pin-logo">ع</div>
  <div class="pin-title">لُغَتِي</div>
  <div class="pin-sub">أدخل رمز الدخول</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2<div class="sub">ABC</div></button>
    <button class="pin-key" onclick="pinPress('3')">3<div class="sub">DEF</div></button>
    <button class="pin-key" onclick="pinPress('4')">4<div class="sub">GHI</div></button>
    <button class="pin-key" onclick="pinPress('5')">5<div class="sub">JKL</div></button>
    <button class="pin-key" onclick="pinPress('6')">6<div class="sub">MNO</div></button>
    <button class="pin-key" onclick="pinPress('7')">7<div class="sub">PQRS</div></button>
    <button class="pin-key" onclick="pinPress('8')">8<div class="sub">TUV</div></button>
    <button class="pin-key" onclick="pinPress('9')">9<div class="sub">WXYZ</div></button>
    <button class="pin-key" style="visibility:hidden"></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <div class="pin-hint">
    بعد الدخول يمكنك تغيير الرمز من زر 🔐
  </div>
</div>

<div id="app">
<div id="hdr" style="background:var(--bg-header);border-bottom:1px solid var(--border);box-shadow:var(--shadow);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50">
  <span id="hs" style="font-size:13px;color:var(--gold);font-weight:700;min-width:70px"></span>
  <div style="text-align:center">
    <div style="font-size:18px;font-weight:700;color:var(--gold)">لُغَتِي</div>
    <div style="font-size:9px;color:var(--text3)">Dilim • Kültür Oyunu</div>
  </div>
  <div style="min-width:70px;display:flex;align-items:center;justify-content:flex-end;gap:6px">
  <span id="hi" style="font-size:11px;color:var(--text3)"></span>
  <button id="themeBtn" onclick="toggleTheme()" title="تبديل الوضع" style="background:var(--bg-card2);border:1px solid var(--border);border-radius:20px;padding:4px 8px;cursor:pointer;font-size:15px;line-height:1;transition:.2s;color:var(--text2)" aria-label="تبديل المظهر">🌙</button>
  <button onclick="showChangePinModal()" title="تغيير الرمز" style="background:var(--bg-card2);border:1px solid var(--border);border-radius:20px;padding:4px 8px;cursor:pointer;font-size:15px;line-height:1;transition:.2s;color:var(--text2)" aria-label="تغيير رمز الدخول">🔐</button>
</div>
</div>
<div id="nav" style="display:none;background:var(--bg-header);border-bottom:1px solid var(--border);">
  <div style="display:flex">
    <button onclick="GT('solo')" id="nt0" style="flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:9px 3px;font-size:11px;cursor:pointer;font-family:inherit;line-height:1.4">فردي<div class="tr">Bireysel</div></button>
    <button onclick="GT('participants')" id="nt1" style="flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:9px 3px;font-size:11px;cursor:pointer;font-family:inherit;line-height:1.4">المشاركون<div class="tr">Katılımcılar</div></button>
    <button onclick="GT('groups')" id="nt1b" style="flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:9px 3px;font-size:11px;cursor:pointer;font-family:inherit;line-height:1.4">مجموعات<div class="tr">Gruplar</div></button>
    <button onclick="GT('live')" id="nt2" style="flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:9px 3px;font-size:11px;cursor:pointer;font-family:inherit;line-height:1.4"><span class="live-badge">LIVE</span><br>مباشر<div class="tr">Canlı</div></button>
  </div>
</div>
<div id="ct" style="padding:18px 15px;min-height:calc(100vh - 110px)"></div>
<div id="mod" style="display:none"></div>
</div>
<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║          SECURITY MODULE — لُغَتِي                              ║
// ║  AES-GCM storage • HMAC message signing • Challenge-Response    ║
// ╚══════════════════════════════════════════════════════════════════╝

var SEC = (function () {
  'use strict';

  // ── Helpers ──────────────────────────────────────────────────────
  function buf2hex(buf) {
    return Array.from(new Uint8Array(buf))
      .map(function (b) { return ('00' + b.toString(16)).slice(-2); })
      .join('');
  }
  function hex2buf(hex) {
    var b = new Uint8Array(hex.length / 2);
    for (var i = 0; i < hex.length; i += 2)
      b[i / 2] = parseInt(hex.substr(i, 2), 16);
    return b.buffer;
  }
  function randHex(bytes) {
    var a = new Uint8Array(bytes);
    crypto.getRandomValues(a);
    return buf2hex(a.buffer);
  }
  function strToBuf(s) {
    return new TextEncoder().encode(s);
  }

  // ── HMAC-SHA256 ───────────────────────────────────────────────────
  // Returns promise → hex string
  function hmac(keyHex, message) {
    return crypto.subtle.importKey(
      'raw', hex2buf(keyHex),
      { name: 'HMAC', hash: 'SHA-256' },
      false, ['sign']
    ).then(function (k) {
      return crypto.subtle.sign('HMAC', k, strToBuf(message));
    }).then(function (sig) {
      return buf2hex(sig);
    });
  }

  // Constant-time hex compare (prevents timing attacks)
  function secureCompare(a, b) {
    if (typeof a !== 'string' || typeof b !== 'string') return false;
    if (a.length !== b.length) return false;
    var diff = 0;
    for (var i = 0; i < a.length; i++)
      diff |= a.charCodeAt(i) ^ b.charCodeAt(i);
    return diff === 0;
  }

  // ── AES-GCM key derivation (PBKDF2) ──────────────────────────────
  // Derives a per-device AES key from a fixed passphrase + device salt
  var _aesKey = null;
  var _deviceSalt = null;

  function getDeviceSalt() {
    var s = localStorage.getItem('_lg_ds');
    if (!s) { s = randHex(16); localStorage.setItem('_lg_ds', s); }
    return s;
  }

  function deriveAESKey() {
    if (_aesKey) return Promise.resolve(_aesKey);
    _deviceSalt = _deviceSalt || getDeviceSalt();
    var pass = strToBuf('lugati-v6-' + _deviceSalt);
    var salt = strToBuf('lugati-salt-2025');
    return crypto.subtle.importKey('raw', pass, 'PBKDF2', false, ['deriveKey'])
      .then(function (baseKey) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          false, ['encrypt', 'decrypt']
        );
      }).then(function (k) {
        _aesKey = k; return k;
      });
  }

  // AES-GCM encrypt → returns base64 string
  function aesEncrypt(plaintext) {
    var iv = new Uint8Array(12);
    crypto.getRandomValues(iv);
    return deriveAESKey().then(function (key) {
      return crypto.subtle.encrypt(
        { name: 'AES-GCM', iv: iv },
        key, strToBuf(JSON.stringify(plaintext))
      );
    }).then(function (ct) {
      var combined = new Uint8Array(12 + ct.byteLength);
      combined.set(iv, 0);
      combined.set(new Uint8Array(ct), 12);
      return btoa(String.fromCharCode.apply(null, combined));
    });
  }

  // AES-GCM decrypt → returns parsed object or null
  function aesDecrypt(b64) {
    try {
      var bytes = atob(b64).split('').map(function (c) { return c.charCodeAt(0); });
      var iv = new Uint8Array(bytes.slice(0, 12));
      var ct = new Uint8Array(bytes.slice(12));
      return deriveAESKey().then(function (key) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
      }).then(function (plain) {
        return JSON.parse(new TextDecoder().decode(plain));
      }).catch(function () { return null; });
    } catch (e) { return Promise.resolve(null); }
  }

  // ── Session Token (embedded in QR) ───────────────────────────────
  // 32-byte random token — never transmitted raw over PeerJS
  // Embedded only in QR URL fragment (never reaches server)
  function generateSessionToken() { return randHex(32); }

  // ── Message Signing ───────────────────────────────────────────────
  // Each PeerJS message is signed: {t, payload, nonce, sig}
  // sig = HMAC(t + '|' + nonce + '|' + JSON.stringify(payload), sessionToken)
  function signMsg(token, type, payload) {
    var nonce = randHex(8);
    var data = type + '|' + nonce + '|' + JSON.stringify(payload);
    return hmac(token, data).then(function (sig) {
      return { t: type, p: payload, n: nonce, s: sig };
    });
  }

  // Returns promise → true/false
  function verifyMsg(token, msg) {
    if (!msg || !msg.t || !msg.n || !msg.s || !msg.p) return Promise.resolve(false);
    var data = msg.t + '|' + msg.n + '|' + JSON.stringify(msg.p);
    return hmac(token, data).then(function (expected) {
      return secureCompare(expected, msg.s);
    });
  }

  // ── Challenge-Response Auth ───────────────────────────────────────
  // Host issues challenge; player proves knowledge of sessionToken without revealing it
  function generateChallenge() { return randHex(16); }

  // Player computes: HMAC(challenge + '|' + playerName, sessionToken)
  function solveChallenge(token, challenge, playerName) {
    return hmac(token, challenge + '|' + playerName);
  }

  // Host verifies challenge response
 function verifyChallenge(token, challenge, playerName, response) {
  return hmac(token, challenge + '|' + playerName).then(function (expected) {
    if (secureCompare(expected, response)) return true;
    // دعم الانضمام اليدوي في حال كان الـ Token عبارة عن أصفار
    return hmac('0'.repeat(64), challenge + '|' + playerName).then(function(expectedFallback) {
      return secureCompare(expectedFallback, response);
    });
  });
}
  // ── Nonce replay protection ───────────────────────────────────────
  var _seenNonces = new Set();
  var _nonceWindow = 120000; // 2 minutes
  var _nonceTimes = {};

  function checkNonce(nonce) {
    if (_seenNonces.has(nonce)) return false;
    _seenNonces.add(nonce);
    _nonceTimes[nonce] = Date.now();
    // Purge old nonces
    var cutoff = Date.now() - _nonceWindow;
    Object.keys(_nonceTimes).forEach(function (n) {

function saveGrp(){
  SEC.aesEncrypt(GRP).then(function(enc){
    try{localStorage.setItem('lg_grp_v2',enc);}catch(e){}
  }).catch(function(){
    // Fallback: store with basic XOR if Web Crypto fails
    try{
      var s=JSON.stringify(GRP),k=31,o=[];
      for(var i=0;i<s.length;i++)o.push((s.charCodeAt(i)^((k*(i+1))%127)).toString(16).padStart(2,'0'));
      localStorage.setItem('lg_grp_v2','xor:'+o.join(''));
    }catch(er){}
  });
}
function loadGrp(){
  var raw=localStorage.getItem('lg_grp_v2');
  if(!raw){return;}
  if(raw.startsWith('xor:')){
    // XOR fallback decode
    try{
      var hex=raw.slice(4),k=31,chars=[];
      for(var i=0;i<hex.length;i+=2){chars.push(String.fromCharCode(parseInt(hex.substr(i,2),16)^((k*(i/2+1))%127)));}
      GRP=validateGrp(JSON.parse(chars.join(''))||[]);
    }catch(e){}
    return;
  }
  SEC.aesDecrypt(raw).then(function(dec){
    if(dec)GRP=validateGrp(dec);
  }).catch(function(){GRP=[];});
}

function renderHostQR(){
  var qb=g('hqr');if(!qb||!H.code)return;
  qb.innerHTML='';
  // QR encodes ONLY the 6-digit code — works with any QR scanner on any device
  try{
    new QRCode(qb,{
      text:H.code,
      width:180,height:180,
      colorDark:'#1E2A3A',colorLight:'#FFFFFF',
      correctLevel:QRCode.CorrectLevel.L  // L = simplest/clearest QR for short text
    });
  }catch(e){
    qb.style.cssText='width:180px;height:180px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#1E2A3A;font-size:36px;font-weight:700;border-radius:8px;font-family:monospace;letter-spacing:6px';
    qb.textContent=H.code;
  }
}

function showCustomQModal(mode){
  var mq=(mode==='host'||mode==='group')?mode:'host';
  window._cqMode=mq;
  var src=mq==='host'?H.customQs:COMP.customQs;
  var m=g('mod');if(!m)return;
  m.style.display='block';
  m.innerHTML=buildCustomQModal(mq,src);
}

function buildCustomQModal(mode,qs){
  var mq=mode==='host'?'host':'group';
  var useChecked=(mq==='host'?H.useCustom:COMP.useCustom);
  var qLen=qs&&qs.length?qs.length:0;
  
  var qList='';
  if(qs&&qs.length){
    for(var qi=0;qi<qs.length;qi++){
      var q=qs[qi];
      var optHtml='';
      for(var oi=0;oi<q.options.length;oi++){
        var isC=oi===q.correct;
        optHtml+='<div style="font-size:12px;padding:3px 8px;border-radius:6px;margin-bottom:3px;background:'+(isC?'var(--green-bg)':'')+'">'+
        '<span style="font-weight:700;color:'+(isC?'var(--green)':'var(--text3)')+'">'+['أ','ب','ج','د'][oi]+'. </span>'+
        SEC.esc(q.options[oi])+(isC?' <span style="color:var(--green);font-size:10px">✓</span>':'')+
        '</div>';
      }
      qList+='<div style="background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;position:relative">'+
      '<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;padding-left:32px">'+SEC.esc(q.question)+'</div>'+
      optHtml+
      '<button onclick="delCQ('+qi+')" style="position:absolute;top:8px;left:6px;background:var(--red-bg);color:var(--red);border:1px solid #FECACA;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit">×</button>'+
      '</div>';
    }
  } else {
    qList='<div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">لا توجد أسئلة مضافة بعد</div>';
  }
  
  // Store mode in global for the inline handlers
  window._cqMode=mq;
  
  return'<div class="modal-bg" onclick="if(event.target===this)cm()">'+
  '<div class="modal" style="max-width:460px">'+
  '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
  '<div><div style="font-size:16px;font-weight:700;color:var(--text)">✏️ أسئلة مخصصة</div>'+
  '<div style="font-size:11px;color:var(--text3)">أضف أسئلتك الخاصة</div></div>'+
  '<button onclick="cm()" style="background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;line-height:1;padding:4px">×</button>'+
  '</div>'+
  '<div style="display:flex;align-items:center;gap:10px;background:var(--bg-card2);border-radius:10px;padding:12px;margin-bottom:14px;border:1px solid var(--border)">'+
  '<input type="checkbox" id="useCustomCb" onchange="toggleUseCustom()" '+(useChecked?'checked':'')+' style="width:18px;height:18px;cursor:pointer;accent-color:var(--gold)"/>'+
  '<div><div style="font-size:13px;font-weight:700">استخدم أسئلتي المخصصة'+(qLen>0?' ('+qLen+' سؤال)':'')+'</div>'+
  '<div style="font-size:11px;color:var(--text3)">عند التفعيل تُستخدم أسئلتك مع أسئلة AI أو بدلاً عنها</div></div>'+
  '</div>'+
  '<div style="background:var(--accent-bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">'+
  '<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px">➕ إضافة سؤال جديد</div>'+
  '<textarea id="cqQ" placeholder="نص السؤال..." style="margin-bottom:8px"></textarea>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px">'+
  '<input id="cqA" type="text" placeholder="الخيار أ"/>'+
  '<input id="cqB" type="text" placeholder="الخيار ب"/>'+
  '<input id="cqC" type="text" placeholder="الخيار ج"/>'+
  '<input id="cqD" type="text" placeholder="الخيار د"/>'+
  '</div>'+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
  '<label style="font-size:12px;color:var(--text2);white-space:nowrap">الإجابة الصحيحة:</label>'+
  '<select id="cqCor" style="flex:1;padding:8px"><option value="0">أ</option><option value="1">ب</option><option value="2">ج</option><option value="3">د</option></select>'+
  '</div>'+
  '<input id="cqEx" type="text" placeholder="شرح الإجابة (اختياري)" style="margin-bottom:10px"/>'+
  '<button onclick="addCustomQ()" class="bgold" style="font-size:13px;padding:10px">إضافة السؤال ✓</button>'+

  '<div style="display:flex;gap:8px;margin-top:14px">'+

  (qLen>0?'<button onclick="clearCQ()" class="bred" style="flex:1;font-size:13px">مسح الكل</button>':'')+
  '</div>'+
  '</div></div>';
}


function addCustomQ(){
  var mode=window._cqMode||'host';
  var qEl=g('cqQ'),aEl=g('cqA'),bEl=g('cqB'),cEl=g('cqC'),dEl=g('cqD'),corEl=g('cqCor'),exEl=g('cqEx');
  var q=(qEl?qEl.value:'').trim();
  var opts=[(aEl?aEl.value:'').trim(),(bEl?bEl.value:'').trim(),(cEl?cEl.value:'').trim(),(dEl?dEl.value:'').trim()];
  var cor=corEl?parseInt(corEl.value):0;
  var ex=(exEl?exEl.value:'').trim();
  if(!q||opts.some(function(o){return!o;})){toast('⚠️ أكمل السؤال والخيارات الأربعة');return;}
  var newQ={question:q,options:opts,correct:cor,explanation:ex,_cat:'custom'};
  if(mode==='host'){H.customQs.push(newQ);}else{COMP.customQs.push(newQ);}
  var src=mode==='host'?H.customQs:COMP.customQs;
  var m=g('mod');if(m){m.innerHTML=buildCustomQModal(mode,src);}
  toast('✓ تم إضافة السؤال ('+(src.length)+' إجمالاً)');
}

function delCQ(idx){
  var mode=window._cqMode||'host';
  if(mode==='host')H.customQs.splice(idx,1);else COMP.customQs.splice(idx,1);
  var src=mode==='host'?H.customQs:COMP.customQs;
  var m=g('mod');if(m){m.innerHTML=buildCustomQModal(mode,src);}
}

function clearCQ(){
  var mode=window._cqMode||'host';
  if(mode==='host')H.customQs=[];else COMP.customQs=[];
  var m=g('mod');if(m){m.innerHTML=buildCustomQModal(mode,[]);}
}

function toggleUseCustom(){
  var mode=window._cqMode||'host';
  var cb=g('useCustomCb');var val=cb?cb.checked:false;
  if(mode==='host')H.useCustom=val;else COMP.useCustom=val;
}

function addPart(){
  var inp=g('partInput');
  var name=SEC.sanitizeName(inp?inp.value:'');
  if(!name){if(inp){inp.style.borderColor='var(--red)';setTimeout(function(){inp.style.borderColor='';},1000);}return;}
  if(PARTICIPANTS.indexOf(name)>=0){toast('⚠️ الاسم موجود مسبقاً');return;}
  if(PARTICIPANTS.length>=100){toast('⚠️ الحد الأقصى 100 مشارك');return;}
  PARTICIPANTS.push(name);
  if(inp){inp.value='';inp.focus();}
  var ct=g('ct');if(ct)ct.innerHTML=sPart();
}

function addBulk(){
  var bulk=g('partBulk');
  if(!bulk||!bulk.value.trim())return;
  var lines=bulk.value.split('\n');
  var added=0,skipped=0;
  for(var i=0;i<lines.length;i++){
    var name=SEC.sanitizeName(lines[i].trim());
    if(!name)continue;
    if(PARTICIPANTS.indexOf(name)>=0){skipped++;continue;}
    if(PARTICIPANTS.length>=100)break;
    PARTICIPANTS.push(name);added++;
  }
  bulk.value='';
  var ct=g('ct');if(ct)ct.innerHTML=sPart();
  toast('✓ أضيف '+added+' مشارك'+(skipped>0?' — '+skipped+' مكرر تم تجاهله':''));
}

function clearAllParts(){

function distributeGroups(){
  if(PARTICIPANTS.length<2){toast('⚠️ أضف مشاركين أولاً');return;}
  var n=DIST_NUM||2;
  var pool=PARTICIPANTS.slice();
  if(DIST_MODE==='random'){
    for(var i=pool.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;
    }
  }
  var groups=[];
  for(var gi=0;gi<n;gi++)groups.push([]);
  for(var pi=0;pi<pool.length;pi++)groups[pi%n].push(pool[pi]);
  showDistPreview(groups);
}

function confirmDist(groups){
  GRP=GRP.filter(function(gr){return!gr._auto;});

function initHostPeer(){
  if(typeof Peer==='undefined'){showPeerError();return;}
  try{
    var peerId='LGv2-'+H.code; // Deterministic so players can connect; security via challenge-response
    var _isHTTPS=location.protocol==='https:';
    H.peer=new Peer(peerId,{debug:0,secure:_isHTTPS,config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'stun:stun2.l.google.com:19302'},
      {urls:'stun:stun3.l.google.com:19302'},
      {urls:'stun:stun4.l.google.com:19302'},
      {urls:'stun:stun.cloudflare.com:3478'},
      {urls:'stun:stun.relay.metered.ca:80'},
      {urls:'turn:global.relay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
      {urls:'turn:global.relay.metered.ca:80?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
      {urls:'turn:global.relay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
      {urls:'turn:global.relay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}
    ],iceCandidatePoolSize:10}});
    H.peer.on('open',function(id){H._peerId=id;});
    H.peer.on('connection',handlePlayerConn);
    H.peer.on('error',function(err){
      if(err.type==='unavailable-id'){H.code=genLiveCode();H.token=SEC.generateSessionToken();show('host_room');setTimeout(initHostPeer,200);}
      else if(err.type!=='peer-unavailable'){toast('خطأ في الاتصال');}
    });
  }catch(e){showPeerError();}
}

function handlePlayerConn(conn){
  // Enforce max players
  if(Object.keys(H.conns).length>=SEC.MAX_PLAYERS){
    try{conn.send({t:'kicked',reason:'full'});}catch(e){}
    setTimeout(function(){try{conn.close();}catch(e){}},200);
    return;
  }
  // Rate limit: max 3 new connections per second from any source
  if(!SEC.rateOk('hostConn',3,1000)){
    try{conn.send({t:'kicked',reason:'rate'});}catch(e){}
    return;
  }
  conn.on('open',function(){
    H.conns[conn.peer]=conn;
    H.connStates[conn.peer]={auth:false,challenge:null,joinTime:Date.now(),msgCount:0};
    updateHostLobby(); // Refresh count immediately on connection
    // Issue challenge — player must prove they have the session token
    var challenge=SEC.generateChallenge();
    H.connStates[conn.peer].challenge=challenge;
    try{conn.send({t:'challenge',c:challenge});}catch(e){}
    conn.on('data',function(data){handleHostData(conn,data);});
    conn.on('close',function(){
      delete H.players[conn.peer];
      delete H.conns[conn.peer];
      delete H.connStates[conn.peer];
      updateHostLobby();
    });
    // Auto-kick if not authenticated within 10s
    setTimeout(function(){
      if(H.connStates[conn.peer]&&!H.connStates[conn.peer].auth){
        try{conn.send({t:'kicked',reason:'auth_timeout'});conn.close();}catch(e){}
        delete H.conns[conn.peer];delete H.connStates[conn.peer];
      }
    },10000);
  });
}

function handleHostData(conn,data){
  if(!data||typeof data!=='object')return;
  var state=H.connStates[conn.peer];
  if(!state)return;
  // Per-connection message rate limit (50 msgs/10s)
  state.msgCount=(state.msgCount||0)+1;
  if(!SEC.rateOk('msg_'+conn.peer,50,10000)){
    try{conn.send({t:'kicked',reason:'flood'});conn.close();}catch(e){}
    return;
  }

  // ── Step 1: handle challenge response (pre-auth) ──────────────
  if(data.t==='join_auth'){
    if(state.auth)return; // already authed
    if(!data.name||!data.resp||!state.challenge)return;
    var pname=SEC.sanitizeName(data.name||'لاعب');
    SEC.verifyChallenge(H.token,state.challenge,pname,data.resp).then(function(valid){
      if(!valid){
        try{conn.send({t:'kicked',reason:'auth_fail'});}catch(e){}
        delete H.conns[conn.peer];delete H.connStates[conn.peer];
        return;
      }
      state.auth=true;state.name=pname;
      H.players[conn.peer]={name:pname,score:0,answered:false,lastCorrect:false,lastPts:0,okCount:0};
      var playerList=Object.values(H.players).map(function(p){return p.name;});
      bcast({t:'lobby',players:playerList});
      updateHostLobby();
      try{conn.send({t:'joined',name:pname,players:playerList});}catch(e){}
    }).catch(function(){
      try{conn.send({t:'kicked',reason:'auth_error'});}catch(e){}
    });
    return;
  }

  // ── All subsequent messages require authentication ────────────
  if(!state.auth)return;

  if(data.t==='answer'&&H.phase==='question'){
    var p=H.players[conn.peer];if(!p||p.answered)return;
    // Validate answer index
    var idx=parseInt(data.idx);
    if(isNaN(idx)||idx<0||idx>3)return;
    p.answered=true;
    p.answerTime=(typeof data.time==='number'&&data.time>0)?data.time:Date.now();
    p.chosenIdx=idx;
    var all=Object.keys(H.players).every(function(id){return H.players[id].answered;});
    updateAnswerFeed();
    if(all){clearInterval(H.timerInterval);revealAnswer();}
  }
}

function bcast(msg){
  if(!msg||!SEC.validateHostMsg(msg))return;
  Object.keys(H.conns).forEach(function(id){
    try{if(H.conns[id]&&H.conns[id].open)H.conns[id].send(msg);}catch(e){}
  });
}

function updateHostLobby(){
  var pc=g('pcount'),pl=g('plist');
  var pCount=Object.keys(H.players).length;
  if(pc)pc.textContent=pCount;
  if(pl)pl.innerHTML=buildPlayerList();
  var ct=g('ct');if(ct&&H.phase==='setup')ct.innerHTML=sHostRoom();
}

function updateAnswerFeed(){
  var feed=g('hfeed');if(!feed)return;
  var count=Object.keys(H.players).filter(function(id){return H.players[id].answered;}).length;
  var total=Object.keys(H.players).length;
  var hac=g('hac');if(hac)hac.textContent=count;
  var names=Object.keys(H.players).filter(function(id){return H.players[id].answered;}).map(function(id){return H.players[id].name;});
  feed.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px">'+
  names.map(function(n,i){return'<span style="background:var(--green-bg);border:1px solid var(--green);border-radius:100px;padding:4px 10px;font-size:12px;color:var(--green)" class="pop">✓ '+n+'</span>';}).join('')+
  '</div>';
}

async function startLiveGame(){
  if(H.selcats.length===0&&!H.useCustom)return;
  H.phase='loading';H.qs=[];
  show('loading');
  // If using only custom questions
  if(H.useCustom&&H.customQs.length>0){
    H.qs=H.customQs.slice();
  }
  // Fetch AI questions for selected cats
  if(H.selcats.length>0){
    for(var i=0;i<H.selcats.length;i++){
      try{var qs=await FQ(H.selcats[i],H.lvl);for(var j=0;j<qs.length;j++){qs[j]._cat=H.selcats[i];}H.qs=H.qs.concat(qs);}
      catch(e){var fb=FBQ(H.selcats[i]);for(var k=0;k<fb.length;k++){fb[k]._cat=H.selcats[i];}H.qs=H.qs.concat(fb);}
    }
    // Mix in custom if enabled
    if(H.useCustom&&H.customQs.length>0){
      H.qs=H.qs.concat(H.customQs);
    }
  }
  // Shuffle & trim to qcount
  for(var a=H.qs.length-1;a>0;a--){var b=Math.floor(Math.random()*(a+1));var tmp=H.qs[a];H.qs[a]=H.qs[b];H.qs[b]=tmp;}
  H.qs=H.qs.slice(0,H.qcount);
  H.qi=-1;
  bcast({t:'game_start',total:H.qs.length});
  setTimeout(function(){nextLiveQ();},500);
}

function nextLiveQ(){
  H.qi++;
  if(H.qi>=H.qs.length){endLiveGame();return;}
  H.phase='question';H.tl=H.qdur;H.answOrder=[];
  // Reset players
  Object.keys(H.players).forEach(function(id){
    H.players[id].answered=false;H.players[id].chosenIdx=-1;H.players[id].answerTime=0;
  });
  var q=H.qs[H.qi];
  bcast({t:'question',qi:H.qi,total:H.qs.length,question:q.question,options:q.options,qdur:H.qdur,tr:q.tr||''});
  show('host_q');
  H.timerInterval=setInterval(function(){
    H.tl--;
    var td=g('htd'),tf=g('tfill');
    var timerColor=H.tl<5?'var(--red)':H.tl<H.qdur/2?'var(--orange)':'var(--green)';
    if(td){td.textContent=H.tl;td.style.color=timerColor;}
    if(tf){tf.style.width=Math.round((H.tl/H.qdur)*100)+'%';tf.style.background=timerColor;}
    if(H.tl<=0){clearInterval(H.timerInterval);revealAnswer();}
  },1000);
}

function revealAnswer(){
  H.phase='reveal';var q=H.qs[H.qi];
  // Build answer order (correct answers sorted by time)
  var corrects=Object.keys(H.players).filter(function(id){
    return H.players[id].answered&&H.players[id].chosenIdx===q.correct;
  }).sort(function(a,b){return H.players[a].answerTime-H.players[b].answerTime;});
  H.answOrder=corrects;
  // Award points
  var speedPts=SPEED_PTS;
  corrects.forEach(function(id,i){
    var pts=speedPts[Math.min(i,speedPts.length-1)];
    H.players[id].score+=pts;H.players[id].lastCorrect=true;H.players[id].lastPts=pts;H.players[id].okCount=(H.players[id].okCount||0)+1;
  });
  Object.keys(H.players).forEach(function(id){
    if(corrects.indexOf(id)<0){H.players[id].lastCorrect=false;H.players[id].lastPts=0;}
  });
  // Build rank map
  var sorted=Object.keys(H.players).sort(function(a,b){return H.players[b].score-H.players[a].score;});
  var rankMap={};sorted.forEach(function(id,i){rankMap[id]=i+1;});
  // Send reveal to each player
  Object.keys(H.conns).forEach(function(id){
    try{
      var p=H.players[id];if(!p)return;
      var pos=corrects.indexOf(id);
      H.conns[id].send({
        t:'reveal',correct:q.correct,myCorrect:p.lastCorrect,
        pts:p.lastPts||0,position:pos>=0?pos+1:'-',
        score:p.score,rank:rankMap[id],explanation:q.explanation||'',
        leaderboard:sorted.slice(0,5).map(function(sid){return{name:H.players[sid].name,score:H.players[sid].score};})
      });
    }catch(e){}
  });
  show('host_qrev');
}

function endLiveGame(){
  H.phase='final';
  var sorted=Object.keys(H.players).sort(function(a,b){return H.players[b].score-H.players[a].score;});
  var rankMap={};sorted.forEach(function(id,i){rankMap[id]=i+1;});
  Object.keys(H.conns).forEach(function(id){
    try{H.conns[id].send({t:'final',rank:rankMap[id]||'-',score:H.players[id]?H.players[id].score:0});}catch(e){}
  });
  show('host_final');
}

function resetLive(){
  if(H.peer){try{H.peer.destroy();}catch(e){}}
  H={peer:null,code:'',conns:{},players:{},qs:[],qi:-1,phase:'setup',selcats:[],lvl:'medium',qdur:20,qcount:10,answOrder:[],timerInterval:null,tl:20};
  GT('live');
}

function showPeerError(){
  toast('تعذّر تحميل نظام الاتصال. تأكد من الاتصال بالإنترنت.');
}

function joinLiveRoom(){
  var pjn=g('pjn'),pjc=g('pjc'),pjerr=g('pjerr');
  // Detect in-app browsers that block WebRTC
  var ua=navigator.userAgent||'';
  var isInApp=/FBAN|FBAV|Instagram|Line|Twitter|MicroMessenger|Telegram|TelegramBrowser/.test(ua);
  var isContent=location.protocol==='content:'||location.protocol==='file:';
  if(isInApp||isContent){
    if(pjerr){
      pjerr.style.color='var(--orange)';
      pjerr.innerHTML='⚠️ افتح الملف في <strong>Chrome أو Safari</strong> مباشرةً<br><span style="font-size:11px">متصفح التطبيق لا يدعم الاتصال المباشر</span>';
    }
    return;
  }
  // Brave browser: WebRTC may be blocked by Shields
  var isBrave=!!(navigator.brave&&navigator.brave.isBrave)||/Brave/.test(ua);
  if(isBrave&&pjerr){
    pjerr.style.color='var(--orange)';
    pjerr.innerHTML='⚠️ Brave يحجب الاتصال — اضغط <strong>اتصال على أي حال</strong> أدناه أو فعّل WebRTC في الإعدادات';
  }
  var name=SEC.sanitizeName(pjn?pjn.value:S.name);
  var inputCode=SEC.sanitizeCode(pjc?pjc.value:P.code);
  if(!name){if(pjerr)pjerr.textContent='أدخل اسمك أولاً';return;}
  if(!SEC.rateOk('plrJoin',20,60000)){if(pjerr)pjerr.textContent='محاولات كثيرة جداً — انتظر دقيقة';return;}
  if(inputCode.length!==6){if(pjerr)pjerr.textContent='الكود يجب أن يكون 6 أرقام';return;}

  // Token always empty now — security via challenge-response only
  var token='';

  P.name=name;P.code=inputCode;P.token=token;S.name=name;P.score=0;P.rank='-';P.phase='join';
  if(pjerr)pjerr.textContent='جارٍ الاتصال... 🔒';
  if(typeof Peer==='undefined'){if(pjerr)pjerr.textContent='خطأ: مكتبة الاتصال غير محملة';return;}
  try{
    if(P.peer){try{P.peer.destroy();}catch(e){}}
    P.peer=new Peer({debug:0,secure:location.protocol==='https:',config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'stun:stun2.l.google.com:19302'},
      {urls:'stun:stun3.l.google.com:19302'},
      {urls:'stun:stun4.l.google.com:19302'},
      {urls:'stun:stun.cloudflare.com:3478'},
      {urls:'stun:stun.relay.metered.ca:80'},
      {urls:'turn:global.relay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
      {urls:'turn:global.relay.metered.ca:80?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
      {urls:'turn:global.relay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
      {urls:'turn:global.relay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}
    ],iceCandidatePoolSize:10}});
    P.peer.on('open',function(){
      // We don't know the host peer ID directly anymore (it has a random suffix)
      // We broadcast to the host via the discovery peer ID which still contains the code
      P.conn=P.peer.connect('LGv2-'+inputCode,{reliable:true,serialization:'json',config:{sdpSemantics:'unified-plan'}});
      P.conn.on('open',_waitForChallenge);
      P.conn.on('data',handlePlayerMsg);
      P.conn.on('error',function(e){
        var el=g('pjerr');
        if(el){el.style.color='var(--red)';el.innerHTML='❌ '+(e.type==='peer-unavailable'?'الغرفة غير موجودة — تأكد أن المضيف فتح اللعبة وأن الكود صحيح':'خطأ في الاتصال: '+e.type);}
      });
      P.conn.on('close',function(){if(P.phase!=='final')toast('انقطع الاتصال بالمضيف');});
      setTimeout(function(){if(P.phase==='join'){var el=g('pjerr');if(el)el.textContent='تعذّر الاتصال — تأكد أن المضيف فتح اللعبة وأن الكود صحيح';}},12000);
    });
    P.peer.on('error',function(e){var el=g('pjerr');if(el)el.textContent='خطأ في الاتصال'+(e.type?' ('+e.type+')':'');});
  }catch(e){if(pjerr)pjerr.textContent='خطأ في إنشاء الاتصال';}
}

function handlePlayerMsg(data){
  if(!data||typeof data!=='object'||!data.t)return;
  if(!SEC.validateHostMsg(data))return;

  // Kicked by host
  if(data.t==='kicked'){
    var kr={full:'الغرفة ممتلئة',rate:'محاولات كثيرة',auth_fail:'رمز القبول خاطئ — امسح QR من جديد',auth_timeout:'انتهت مهلة التحقق',flood:'حُظرت بسبب إرسال كثير'};
    toast('❌ '+(kr[data.reason]||'تم رفض الاتصال'));
    clearInterval(P.timer);P.phase='join';show('player_join');return;
  }

  // Challenge from host — prove we have the session token
  if(data.t==='challenge'){
    if(!data.c)return;
    var tok=P.token||'0'.repeat(64);
    SEC.solveChallenge(tok,data.c,P.name).then(function(resp){
      if(P.conn&&P.conn.open)P.conn.send({t:'join_auth',name:P.name,resp:resp});
    });
    return;
  }
  if(data.t==='joined'){P.phase='lobby';P.players=[P.name];show('player_lobby');}
  if(data.t==='lobby'){P.players=data.players||[];var pl=g('plob_pl');if(pl)pl.innerHTML=buildPlyrLobby();}
  if(data.t==='game_start'){P.totalQ=data.total||10;P.qi=0;toast('بدأت المسابقة! 🚀',1500);}
  if(data.t==='question'){
    P.qi=data.qi+1;P.totalQ=data.total;P.currentQ={question:data.question,options:data.options,tr:data.tr};
    P.answered=false;P.qdur=data.qdur||20;P.tl=data.qdur||20;P.phase='question';
    show('player_q');
    clearInterval(P.timer);
    P.timer=setInterval(function(){
      P.tl--;
      var td=g('ptd'),tf=g('ptfill');
      var tc=P.tl<5?'var(--red)':P.tl<P.qdur/2?'var(--orange)':'var(--green)';
      if(td){td.textContent=P.tl;td.style.color=tc;}
      if(tf){tf.style.width=Math.round((P.tl/P.qdur)*100)+'%';tf.style.background=tc;}
      if(P.tl<=0){clearInterval(P.timer);}
    },1000);
  }
  if(data.t==='reveal'){
    clearInterval(P.timer);
    P.lastResult={correct:data.myCorrect,pts:data.pts,position:data.position,explanation:data.explanation,leaderboard:data.leaderboard};
    P.score=data.score;P.rank=data.rank;P.phase='feedback';
    show('player_fb');
  }
  if(data.t==='final'){P.score=data.score;P.rank=data.rank;P.phase='final';show('player_final');}
}

function playerAnswer(idx){
  if(P.answered||P.phase!=='question')return;
  if(!SEC.rateOk('plrAns',4,5000))return;
  idx=parseInt(idx);if(isNaN(idx)||idx<0||idx>3)return;

  var btn=g('pb'+idx);

  if(P.conn&&P.conn.open)P.conn.send({t:'answer',idx:idx,time:Date.now()});
  // Dim other buttons
  for(var i=0;i<4;i++){if(i!==idx){var b=g('pb'+i);if(b)b.classList.add('dim');}}
  var ct=g('ct');if(ct){
    var aw=ct.querySelector('.ans-btn:not(.dim)');

  }
}

// TIMERS & GAME CONTROLS
// ═══════════════════════════════════════════
function tick(){
  clearInterval(TI);S.tl=20;S.ans=false;
  TI=setInterval(function(){
    S.tl--;var td=g('td');
    if(td){td.textContent=S.tl;td.style.color=S.tl<=5?'var(--red)':S.tl<=10?'var(--orange)':'var(--gold)';}
    if(S.tl<=0){clearInterval(TI);if(!S.ans){if(S.tab==='playing')tOut();else ctOut();}}
  },1000);
}
function tOut(){S.ans=true;var q=S.qs[S.qi];HL(-1,q.correct);doFB(false,q,'⏰ ');NBs();}
function ctOut(){S.ans=true;var q=COMP.qs[COMP.qi];HL(-1,q.correct);doFB(false,q,'⏰ ');showQR_fb(false,q);NBC();}
function pick(i){
  if(S.ans)return;clearInterval(TI);S.ans=true;
  var q=S.qs[S.qi],ok=i===q.correct;
  if(ok){S.score+=20+Math.floor(S.tl/2);S.ok++;}
  HL(i,q.correct);doFB(ok,q,'');NBs();UH();
}
function cpick(i){
  if(S.ans)return;clearInterval(TI);S.ans=true;
  var q=COMP.qs[COMP.qi],ok=i===q.correct;
  if(ok){COMP.sc[COMP.cur]+=20+Math.floor(S.tl/2);COMP.okC[COMP.cur]=(COMP.okC[COMP.cur]||0)+1;}
  GRP[COMP.grps[COMP.cur]].played++;GRP[COMP.grps[COMP.cur]].s=COMP.sc[COMP.cur];saveGrp();
  HL(i,q.correct);doFB(ok,q,'');showQR_fb(ok,q);NBC();UH();
}
function HL(sel,cor){
  for(var i=0;i<4;i++){
    var b=g('o'+i);if(!b)continue;
    if(i===cor){b.style.background='#0F3A20';b.style.borderColor='var(--green)';b.style.color='#5FCF8A';}
    else if(i===sel&&sel!==cor){b.style.background='#3A0F10';b.style.borderColor='var(--red)';b.style.color='#F07070';}
    else b.style.opacity='0.35';
  }
}
function doFB(ok,q,pfx){
  var el=g('fb');if(!el)return;
  el.style.display='block';el.style.background=ok?'#0F3020':'#30100F';el.style.borderRight='3px solid '+(ok?'var(--green)':'var(--red)');
  el.innerHTML='<strong style="color:'+(ok?'#5FCF8A':'#F07070')+'">'+pfx+rnd(ok?ER:EW)+'</strong><br>'+
  '<span style="font-size:13px">'+q.explanation+'</span>'+(q.tr?'<div class="tr">'+q.tr+'</div>':'');
}
function showQR_fb(ok,q){
  var el=g('qres');if(!el)return;el.style.display='block';
  var allSc=[];for(var i=0;i<COMP.grps.length;i++)allSc.push({n:GRP[COMP.grps[i]].n,c:GRP[COMP.grps[i]].c,sc:COMP.sc[i],ok:COMP.okC[i]||0,tot:COMP.qi+1});
  allSc.sort(function(a,b){return b.sc-a.sc;});var maxSc=allSc[0].sc||1;var medals=['🥇','🥈','🥉'];var motiv=ok?rnd(MOTIV_OK):rnd(MOTIV_WR);
  var h='<div style="background:var(--bg-page);border-radius:12px;padding:13px;margin-top:10px;border:1px solid var(--border)" class="pop">'+
  '<div style="text-align:center;margin-bottom:10px"><div style="font-size:18px;margin-bottom:4px">'+(ok?'🎯':'📚')+'</div>'+
  '<div style="font-size:13px;font-weight:700;color:'+(ok?'var(--gold)':'#DDE6FF')+'">'+motiv+'</div></div>'+
  '<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:8px">📊 الترتيب — Sıralama</div>';
  for(var i=0;i<allSc.length;i++){
    var grp=allSc[i];var bw=maxSc>0?Math.round((grp.sc/maxSc)*100):0;var pct=grp.tot>0?Math.round((grp.ok/grp.tot)*100):0;
    h+='<div style="margin-bottom:9px'+(i===0?';background:#0F2A10;border-radius:8px;padding:8px;border:1px solid #2A5A2A':'')+'">'+'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
    '<span style="font-size:14px">'+(medals[i]||'•')+'</span>'+
    '<div style="width:22px;height:22px;border-radius:50%;background:'+grp.c+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">'+grp.n[0]+'</div>'+
    '<div style="flex:1;font-size:13px;font-weight:700">'+grp.n+(i===0?' 👑':'')+' <span style="font-size:10px;color:var(--text2)">'+pct+'%</span></div>'+
    '<div style="font-size:15px;font-weight:700;color:var(--gold)">'+grp.sc+'</div></div>'+
    '<div style="background:var(--bg-card);border-radius:100px;height:5px;overflow:hidden">'+
    '<div style="background:'+grp.c+';height:100%;width:'+bw+'%;border-radius:100px;transition:.7s ease"></div></div></div>';
  }
  el.innerHTML=h+'</div>';
}
function NBs(){var b=g('nb');if(!b)return;b.style.display='block';b.textContent=S.qi<S.qs.length-1?'التالي ←':'النتائج';}
function NBC(){
  var b=g('nb');if(!b)return;b.style.display='block';
  if(COMP.qi<COMP.qs.length-1){var ni=COMP.grps[(COMP.cur+1)%COMP.grps.length];b.textContent='▶ دور '+GRP[ni].n;}
  else b.textContent='🏆 النتائج النهائية';
}
function nxt(){clearInterval(TI);S.qi++;if(S.qi>=S.qs.length)show('results');else show('playing');}
function cnxt(){
  clearInterval(TI);if(COMP.qi>=COMP.qs.length-1){show('compres');return;}
  COMP.qi++;COMP.cur=(COMP.cur+1)%COMP.grps.length;S.ans=false;S.tab='compplay';show('compplay');
}

var _theme='light';

  applyTheme(_theme);

}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  var btn=g('themeBtn');
  if(btn)btn.textContent=t==='dark'?'☀️':'🌙';
  _theme=t;
}
function initTheme(){
  var saved='light';
  try{saved=localStorage.getItem('lg_theme')||'light';}catch(e){}
  // Also respect OS preference if no saved pref
  if(!localStorage.getItem('lg_theme')&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){saved='dark';}
  applyTheme(saved);
}


// ════════════════════════════════════════════
// PIN LOCK
// ════════════════════════════════════════════
var _pinInput='';
var _pinAttempts=0;
var _pinLocked=false;
var _pinLockUntil=0;

// PIN hash — SHA-256 of access code
var _PIN_HASH='3052c83f1a40e0c48bceb166e667b16a0b0e4a5e924229dc3babf3b9da425a71';

function _sha256Simple(str){
  // Simple hash for PIN comparison using SubtleCrypto
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
    .then(function(buf){
      return Array.from(new Uint8Array(buf))
        .map(function(b){return('00'+b.toString(16)).slice(-2);}).join('');
    });
}

function pinPress(d){
  if(_pinLocked){
    var rem=Math.ceil((_pinLockUntil-Date.now())/1000);
    if(Date.now()<_pinLockUntil){
      showPinErr('محاول محظور — انتظر '+rem+' ثانية');return;
    } else {_pinLocked=false;_pinAttempts=0;}
  }
  if(_pinInput.length>=4)return;
  _pinInput+=d;
  updatePinDots();
  if(_pinInput.length===4)checkPin();
}

function pinDel(){
  if(_pinInput.length>0){
    _pinInput=_pinInput.slice(0,-1);
    updatePinDots();
    clearPinErr();
  }
}

function updatePinDots(){
  for(var i=0;i<4;i++){
    var dot=document.getElementById('pd'+i);
    if(dot){
      dot.className='pin-dot'+(i<_pinInput.length?' filled':'');
    }
  }
}

function checkPin(){
  _sha256Simple(_pinInput).then(function(hash){
    if(hash===_PIN_HASH){
      // Correct PIN
      var ov=document.getElementById('pin-overlay');
      if(ov){ov.className='hide';setTimeout(function(){ov.style.display='none';},400);}
      _pinInput='';
      try{sessionStorage.setItem('lg_unlocked','1');}catch(e){}
    } else {
      // Wrong PIN
      _pinAttempts++;
      _pinInput='';
      updatePinDots();
      // Flash dots red
      for(var i=0;i<4;i++){
        var dot=document.getElementById('pd'+i);
        if(dot)dot.className='pin-dot error';
      }
      setTimeout(function(){updatePinDots();},500);
      if(_pinAttempts>=5){
        _pinLocked=true;
        _pinLockUntil=Date.now()+30000;
        showPinErr('5 محاولات خاطئة — محظور 30 ثانية');
      } else {
        showPinErr('رمز خاطئ — '+(5-_pinAttempts)+' محاولات متبقية');
      }
    }
  });
}

function showPinErr(msg){
  var el=document.getElementById('pin-err');
  if(el)el.textContent=msg;
}
function clearPinErr(){
  var el=document.getElementById('pin-err');
  if(el)el.textContent='';
}

function initPinLock(){
  // Skip lock if already unlocked this session
  try{
    if(sessionStorage.getItem('lg_unlocked')==='1'){
      var ov=document.getElementById('pin-overlay');
      if(ov)ov.style.display='none';
      return;
    }
  }catch(e){}
  // Show the overlay (already visible)
}

  '<input id="newPin2" type="password" inputmode="numeric" maxlength="4" placeholder="تأكيد الرمز" style="text-align:center;letter-spacing:8px;font-size:22px;margin-bottom:14px"/>'+
  '<div id="cpinErr" style="color:var(--red);font-size:12px;min-height:18px;margin-bottom:10px"></div>'+
  '<button onclick="saveNewPin()" class="bgold">حفظ الرمز الجديد</button>'+
  '<div style="font-size:11px;color:var(--text3);margin-top:10px">⚠️ احفظ الرمز — لا يمكن استعادته</div>'+
  '</div></div>';
}

function saveNewPin(){
  var p1=g('newPin1'),p2=g('newPin2'),err=g('cpinErr');
  var v1=p1?p1.value.trim():'',v2=p2?p2.value.trim():'';
  if(v1.length!==4||isNaN(v1)){if(err)err.textContent='الرمز يجب أن يكون 4 أرقام';return;}
  if(v1!==v2){if(err)err.textContent='الرمزان غير متطابقين';return;}
  _sha256Simple(v1).then(function(hash){
    _PIN_HASH=hash;
    toast('✓ تم تغيير رمز الدخول بنجاح');
    cm();
  });
}


function openInChrome(){
  var url=location.href;
  // Android: intent URL to open in Chrome
  var intentUrl='intent://'+url.replace(/^https?:\/\//,'')+'#Intent;scheme=https;package=com.android.chrome;end';
  try{location.href=intentUrl;}catch(e){
    // Fallback: copy URL and instruct
    try{navigator.clipboard.writeText(url).then(function(){toast('تم نسخ الرابط — الصقه في Chrome');});}
    catch(e2){toast('انسخ الرابط وافتحه في Chrome يدوياً');}
  }
}


function shareGameUrl(){
  var url=location.href.split('#')[0];
  if(navigator.share){
    navigator.share({title:'لُغَتِي — لعبة تعليمية',text:'انضم للعبة!',url:url})
    .catch(function(){copyUrlFallback(url);});
  } else {
    copyUrlFallback(url);
  }
}
function copyUrlFallback(url){
  navigator.clipboard.writeText(url)
    .then(function(){toast('✓ تم نسخ رابط اللعبة');})
    .catch(function(){toast('الرابط: '+url);});
}
