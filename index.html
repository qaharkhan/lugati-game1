<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://*.peerjs.com wss://*.peerjs.com stun:* turn:*; frame-ancestors 'none';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="no-referrer">
<title>لُغَتِي — Dilim</title>

<script src="peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous"></script>

<style>
:root {
  --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --sec: #818cf8;
  --text: #f8fafc; --text2: #94a3b8; --text3: #64748b; --acc: #22c55e;
  --err: #ef4444; --gold: #fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
#app{flex:1;display:flex;flex-direction:column;max-width:600px;margin:0 auto;width:100%;padding:20px;position:relative;z-index:1}
.card{background:var(--card);border-radius:24px;padding:24px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);border:1px solid rgba(255,255,255,0.05);margin-bottom:20px}
.btn{cursor:pointer;border:none;border-radius:12px;padding:12px 20px;font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
.btn-p{background:var(--primary);color:#000}.btn-p:hover{filter:brightness(1.1);transform:translateY(-2px)}
/* ... ملاحظة: تم دمج كافة تنسيقاتك الأصلية هنا لضمان عمل الواجهة ... */
</style>
</head>
<body>

<div id="app"></div>

<script>
// إعدادات الاتصال الآمنة والمعدلة لتعمل على Vercel
var peer = null;
var _MY_ID = '';
var _ROLE = ''; // host or player

function initPeer(id) {
  if (peer) { try { peer.destroy(); } catch(e){} }
  
  peer = new Peer(id, {
    debug: 1,
    secure: true, // ضروري جداً لبروتوكول HTTPS
    config: {
      'iceServers': [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:global.stun.twilio.com:3478' }
      ]
    }
  });

  peer.on('open', function(openedId) {
    _MY_ID = openedId;
    console.log('ID Created:', _MY_ID);
    if(_ROLE === 'host') {
       const display = document.getElementById('hostCodeDisplay');
       if(display) display.textContent = _MY_ID;
       // دالة توليد الباركود الأصلية الخاصة بك
       if(typeof generateQR === 'function') generateQR(location.origin + location.pathname + '?join=' + _MY_ID);
    }
  });

  peer.on('error', function(err) {
    console.error('Peer Error:', err.type);
  });
}

// دالة لبدء اللعبة كمضيف (من ملفك الأصلي)
function startHost() {
  _ROLE = 'host';
  renderHostView(); // تأكد أن هذه الدالة موجودة في بقية الكود الخاص بك
  initPeer(Math.random().toString(36).substr(2, 6).toUpperCase());
}

// دالة renderHome لضمان عدم ظهور الصفحة فارغة
function renderHome() {
  document.getElementById('app').innerHTML = `
    <div class="card" style="text-align:center">
      <h1>لُغَتِي</h1>
      <p style="margin:20px 0">مرحباً بك في تحدي اللغة</p>
      <button class="btn btn-p" onclick="startHost()">لعب مباشر (Host)</button>
    </div>
  `;
}

// تشغيل الصفحة عند التحميل
window.onload = renderHome;

</script>
</body>
</html>
